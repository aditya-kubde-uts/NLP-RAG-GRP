# Pre-commit hooks — run `pre-commit install` once to enable.
# See https://pre-commit.com for installation.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.13.1
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: local
    hooks:
      - id: prettier
        name: prettier (frontend)
        language: system
        entry: pnpm --dir frontend exec prettier --write
        files: ^frontend/src/.*\.(ts|tsx|css)$|^frontend/tests/.*\.(ts|tsx)$|^frontend/e2e/.*\.(ts|tsx)$
      - id: eslint
        name: eslint (frontend)
        language: system
        entry: pnpm --dir frontend exec eslint
        files: ^frontend/.*\.(ts|tsx)$
